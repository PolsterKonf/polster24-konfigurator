<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minimaler Wix Test</title>
<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f5f5;
}
button{
  padding:12px 16px;
  font-size:16px;
  cursor:pointer;
}
#log{
  margin-top:16px;
  background:white;
  border:1px solid #ccc;
  padding:12px;
  white-space:pre-wrap;
  font-size:14px;
}
</style>
</head>

<body>

<button id="sendBtn">Testnachricht senden</button>

<div id="log">HTML geladen...\n</div>

<script>

const logEl = document.getElementById("log");

function log(msg){
  console.log(msg);
  logEl.textContent += msg + "\n";
}

function send(payload){
  const message = JSON.stringify(payload);
  window.parent.postMessage(message,"*");
  log("GESENDET: " + message);
}

window.addEventListener("message",(event)=>{
  log("VON WIX: " + JSON.stringify(event.data));
});

window.onload = function(){
  log("Fenster geladen");

  send({
    type:"POLSTER24_READY",
    source:"minimal-parent-only"
  });
};

document.getElementById("sendBtn").onclick = function(){

  send({
    type:"POLSTER24_ADD_TO_CART",
    source:"minimal-parent-only",
    data:{
      form:"Testform",
      total:12.34,
      fabric:"Teststoff",
      foam:"Testschaum"
    }
  });

};

</script>

</body>
</html>
