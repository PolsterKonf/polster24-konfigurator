<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'Segoe UI',sans-serif;background:#F5F0E8;-webkit-font-smoothing:antialiased;font-size:16px}

  #root { height: auto !important; }
}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

const C = {
  linen:"#F5F0E8",linen2:"#EDE7D9",bark:"#2B2318",bark2:"#4A3D2F",
  moss:"#4C5E48",sand:"#B89B72",sand2:"#D4B98A",chalk:"#FDFAF5",mid:"#8A7D6A",
};
const fmt = n => n.toFixed(2).replace(".",",") + " €";

const FOAM_TYPES = {
  "none":      {name:"Kein Schaumstoff",         density:0 },
  "pur_18_20": {name:"PUR 18/20 – sehr weich",   density:18},
  "pur_22_40": {name:"PUR 22/40 – mittelweich",  density:22},
  "pur_30_48": {name:"PUR 30/48 – fest",         density:30},
  "pur_40_70": {name:"PUR 40/70 – sehr fest",    density:40},
  "hr_30_40":  {name:"HR Kaltschaum 30/40 H2",   density:30},
  "hr_40_40":  {name:"HR Kaltschaum 40/40 H3",   density:40},
  "hr_45_50":  {name:"HR Kaltschaum 45/50 H4",   density:45},
};

// a=Dicke, b=Länge, c=Breite IMMER (Pflicht, Rechteck-Kalkulation)
// d,e,f = nur wenn in DB-Tabelle vorhanden → nur für Fertigung anzeigen
const FORMS = [
  {id:"rechteck",             label:"Rechteck – Würfel",                    foamFactor:1,    sides:["a","b","c"]            },
  {id:"rechteck-schraeg",     label:"Rechteck mit Schrägabschnitt",         foamFactor:1.2,  sides:["a","b","c","d","e"]    },
  {id:"rechteck-kl-eck",      label:"Rechteck mit kleinem Eckabschnitt",    foamFactor:1.2,  sides:["a","b","c","d","e","f"]},
  {id:"dreieck-recht",        label:"Rechtwinkliges Dreieck",               foamFactor:1.8,  sides:["a","b","c"]            },
  {id:"dreieck-gleich",       label:"Gleichseitiges Dreieck",               foamFactor:1.6,  sides:["a","b","c"]            },
  {id:"dreieck-abschnitt",    label:"Dreieck mit Abschnitt",                foamFactor:1.2,  sides:["a","b","c","d"]        },
  {id:"trapez",               label:"Trapez",                               foamFactor:1.58, sides:["a","b","c","d"]        },
  {id:"fuenfeck",             label:"Fünfeck",                              foamFactor:2.12, sides:["a","b","c","d"]        },
  {id:"sechseck",             label:"Sechseck",                             foamFactor:2.12, sides:["a","b","c","d"]        },
  {id:"achteck",              label:"Achteck",                              foamFactor:2.2,  sides:["a","b","c","d","e"]    },
  {id:"rechteck-zwei-eck",    label:"Rechteck mit 2 Eckabschnitten",        foamFactor:1.2,  sides:["a","b","c","d","e"]    },
  {id:"eckkissen",            label:"Eckkissen",                            foamFactor:1.95, sides:["a","b","c","d","e","f"]},
  {id:"l-form",               label:"L-Form",                               foamFactor:1.89, sides:["a","b","c","d","e"]    },
  {id:"u-form",               label:"U-Form",                               foamFactor:1.82, sides:["a","b","c","d","e"]    },
  {id:"eck-abschnitt",        label:"Rechteck mit Eckabschnitt",            foamFactor:1.2,  sides:["a","b","c","d","e"]    },
  {id:"rechteck-abschnitt",   label:"Rechteck mit Abschnitt",               foamFactor:1.2,  sides:["a","b","c","d"]        },
  {id:"rechteck-vier-eck",    label:"Rechteck mit 4 Eckabschnitten",        foamFactor:2,    sides:["a","b","c","d","e"]    },
  {id:"rechteck-zwei-schraeg",label:"Rechteck mit 2 Schrägabschnitten",     foamFactor:1.2,  sides:["a","b","c","d","e"]    },
];


const FORM_IMAGES = window.FORM_IMAGES || {};



const FABRICS = [
  {id:"l2",  n:"Lex 2",              c:"#8B7355",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"l4",  n:"Lex 4",              c:"#9B9B9B",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"l5",  n:"Lex 5",              c:"#6A6A6A",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"l22", n:"Lex 22",             c:"#6B8E5E",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"l26", n:"Lex 26",             c:"#B0A898",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"l33", n:"Lex 33",             c:"#404040",p:9.5,  cat:"indoor",     g:"Lex"},
  {id:"c1",  n:"Calima 1",           c:"#F0EAE0",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c6",  n:"Calima 6",           c:"#A07850",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c11", n:"Calima 11",          c:"#3A2A18",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c16", n:"Calima 16",          c:"#4A6B8A",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c17", n:"Calima 17",          c:"#6B8E5E",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c31", n:"Calima 31",          c:"#787878",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c33", n:"Calima 33",          c:"#C8B898",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"c36", n:"Calima 36",          c:"#1A1A1A",p:12.75,cat:"indoor",     g:"Calima"},
  {id:"s1",  n:"Soleo 1",            c:"#D8D0C0",p:20,   cat:"premium",    g:"Soleo"},
  {id:"s2",  n:"Soleo 2",            c:"#A0A0A0",p:20,   cat:"premium",    g:"Soleo"},
  {id:"s3",  n:"Soleo 3",            c:"#606060",p:20,   cat:"premium",    g:"Soleo"},
  {id:"s6",  n:"Soleo 6",            c:"#D4907A",p:20,   cat:"premium",    g:"Soleo"},
  {id:"s11", n:"Soleo 11",           c:"#5080A0",p:20,   cat:"premium",    g:"Soleo"},
  {id:"s15", n:"Soleo 15",           c:"#3A6040",p:20,   cat:"premium",    g:"Soleo"},
  {id:"g1",  n:"Gaia 1",             c:"#C8A070",p:20.98,cat:"premium",    g:"Gaia"},
  {id:"g4",  n:"Gaia 4",             c:"#708090",p:20.98,cat:"premium",    g:"Gaia"},
  {id:"g7",  n:"Gaia 7",             c:"#506870",p:20.98,cat:"premium",    g:"Gaia"},
  {id:"sv1", n:"Silvertex Macadamia",c:"#D4C4A0",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv2", n:"Silvertex Mocca",    c:"#7A5A40",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv3", n:"Silvertex Taupe",    c:"#B0A090",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv4", n:"Silvertex Carbon",   c:"#303030",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv5", n:"Silvertex Ice",      c:"#D8E8F0",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv6", n:"Silvertex Red",      c:"#C04040",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"sv7", n:"Silvertex Basil",    c:"#4A6840",p:41,   cat:"outdoor",    g:"Silvertex"},
  {id:"v1",  n:"Vivo 1",             c:"#D0C8B8",p:15,   cat:"kunstleder", g:"Vivo"},
  {id:"v3",  n:"Vivo 3",             c:"#A8A8A8",p:15,   cat:"kunstleder", g:"Vivo"},
  {id:"v6",  n:"Vivo 6",             c:"#5A4030",p:15,   cat:"kunstleder", g:"Vivo"},
  {id:"v10", n:"Vivo 10",            c:"#703020",p:15,   cat:"kunstleder", g:"Vivo"},
  {id:"v14", n:"Vivo 14",            c:"#3060A0",p:15,   cat:"kunstleder", g:"Vivo"},
  {id:"v32", n:"Vivo 32",            c:"#3A6040",p:15,   cat:"kunstleder", g:"Vivo"},
];

const EXTRAS = [
  {id:"rz",  label:"Reißverschluss",        icon:"🔐",desc:"Abnehmbarer Bezug – inklusive.",          perM2:false,price:0},
  {id:"watt",label:"Wattierung",             icon:"☁️", desc:"Weichere Optik durch Watteschicht.",    perM2:true, price:8},
  {id:"trik",label:"Trikotierung (Jersey)",  icon:"🧤",desc:"Schützende Jerseyschicht um den Kern.", perM2:true, price:4},
  {id:"anti",label:"Anti-Rutsch Unterseite", icon:"🛑",desc:"Ideal für glatte Stühle und Bänke.",    perM2:false,price:3},
  // {id:"expr",label:"Express-Lieferung 48h", icon:"⚡", desc:"Garantiert innerhalb 48h.", perM2:false,price:49.99},
];

const STEPS = ["Form","Maße","Stoff","Schaum","Extras","Warenkorb"];
const FOAM_PRICE_PER_KG = 22;

// ── small helpers ──
const Tip = ({children}) => (
  React.createElement('div',{style:{background:C.linen2,borderLeft:`3px solid ${C.sand}`,
    padding:"10px 14px",fontSize:12,color:C.mid,lineHeight:1.6,marginBottom:"1.2rem"}},children)
);

const SH = ({n,title,sub}) => (
  React.createElement('div',{style:{marginBottom:"1.8rem"}},
    React.createElement('div',{style:{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",
      color:C.sand,display:"flex",alignItems:"center",gap:8,marginBottom:6}},
      React.createElement('span',{style:{width:24,height:1,background:C.sand,display:"inline-block"}}),
      `Schritt ${n} von 6`
    ),
    React.createElement('h2',{style:{fontSize:"clamp(1.6rem,2.2vw,2.4rem)",fontWeight:300,
      lineHeight:1.15,fontFamily:"Georgia,serif",marginBottom:6,color:C.bark}},title),
    React.createElement('p',{style:{fontSize:13,color:C.mid,lineHeight:1.7}},sub)
  )
);

const DimInput = ({label,value,onChange,isPrice,hint}) => {
  const displayLabel = label==="a" ? "Dicke" : `Seite ${label.toUpperCase()}`;
  const finalHint    = label==="a" ? "= Höhe / Dicke des Polsters" : hint;
  return React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:4}},
    React.createElement('div',{style:{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",
      color:isPrice?C.sand:C.mid,display:"flex",alignItems:"center",gap:6}},
      React.createElement('span',{style:{width:20,height:20,
        background:isPrice?C.sand:"rgba(184,155,114,.25)",
        color:isPrice?C.bark:C.mid,borderRadius:2,display:"inline-flex",
        alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}},
        label.toUpperCase()
      ),
      displayLabel
    ),
    React.createElement('div',{style:{position:"relative"}},
      React.createElement('input',{type:"number",min:"1",max:"500",placeholder:"cm",
        value:value||"",onChange:e=>onChange(e.target.value),
        style:{width:"100%",background:C.chalk,
          border:`1.5px solid ${isPrice?"rgba(184,155,114,.4)":"rgba(184,155,114,.15)"}`,
          padding:"12px 36px 12px 14px",fontSize:16,color:C.bark,outline:"none"}}),
      React.createElement('span',{style:{position:"absolute",right:10,top:"50%",
        transform:"translateY(-50%)",fontSize:11,color:C.mid}},"cm")
    ),
    finalHint && React.createElement('span',{style:{fontSize:10,color:C.mid}},finalHint)
  );
};

function App() {
  const [isMobile,  setIsMobile] = useState(window.innerWidth <= 768);
  const [cartError,  setCartError]  = useState(null);
  const [cartLoading,setCartLoading]= useState(false);
  React.useEffect(()=>{
    const handler = ()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);

  // Empfängt Antwort vom Wix Velo (Erfolg oder Fehler)
  React.useEffect(()=>{
    const handler = (event)=>{
      let msg;
      try { msg = typeof event.data==="string"?JSON.parse(event.data):event.data; } catch(e){ return; }
      if(msg?.type==="POLSTER24_CART_SUCCESS"){
        setCartLoading(false);
        setCartError(null);
        setSuccess(true);
      }
      if(msg?.type==="POLSTER24_CART_ERROR"){
        setCartError(msg.error||"Fehler beim Hinzufügen zum Warenkorb.");
        setCartLoading(false);
      }
    };
    window.addEventListener("message", handler);
    return ()=>window.removeEventListener("message", handler);
  },[]);

  // Meldet die aktuelle Höhe an Wix damit das iFrame mitwächst
  React.useEffect(()=>{
    const reportHeight = ()=>{
      const h = document.body.scrollHeight;
      window.parent.postMessage({intent:"TPA2",type:"setHeight",compId:"konfigurator",
        namespace:"Wix",version:"1.0",data:{height:h}}, "*");
    };
    reportHeight();
    const observer = new ResizeObserver(reportHeight);
    observer.observe(document.body);
    return ()=>observer.disconnect();
  },[step, success]);
  const [step,      setStep]     = useState(0);
  const [formId,    setFormId]   = useState("rechteck");
  const [dims,      setDims]     = useState({});
  const [foamKey,   setFoamKey]  = useState("none");
  const [fabric,    setFabric]   = useState(null);
  const [fabFilter, setFabFilter]= useState("alle");
  const [extras,    setExtras]   = useState({rz:true});
  const [success,   setSuccess]  = useState(false);
  const [order,     setOrder]    = useState({fn:"",ln:"",email:"",phone:"",addr:"",pay:"",note:""});

  const cf  = FORMS.find(f=>f.id===formId)||FORMS[0];
  const foam= FOAM_TYPES[foamKey];
  const fab = FABRICS.find(f=>f.id===fabric);

  const prices = useMemo(()=>{
    // Kalkulation IMMER als Rechteck: a=Dicke, b=Länge, c=Breite
    const a = parseFloat(dims.a||0)/100;
    const b = parseFloat(dims.b||0)/100;
    const c = parseFloat(dims.c||0)/100;
    if(!a||!b||!c) return {fabric:0,foam:0,jersey:0,wadding:0,extras:0,total:0,surface:0,volume:0};
    const surface = 2*(a*b + a*c + b*c);
    const volume  = a*b*c;
    const fabricRaw = fab ? Math.round(surface*fab.p*100)/100 : 0;
    const fabricCost = fabricRaw>0 ? Math.max(47.99, fabricRaw) : 0;
    const foamCost = foam.density>0 ? Math.round(cf.foamFactor*FOAM_PRICE_PER_KG*foam.density*volume*100)/100 : 0;
    const jerseyCost  = extras.trik ? Math.round(4*surface*100)/100 : 0;
    const waddingCost = extras.watt ? Math.round(8*surface*100)/100 : 0;
    const otherExtras = EXTRAS.filter(e=>e.id!=="watt"&&e.id!=="trik"&&extras[e.id]).reduce((s,e)=>s+e.price,0);
    const total = fabricCost+foamCost+jerseyCost+waddingCost+otherExtras;
    return {fabric:fabricCost,foam:foamCost,jersey:jerseyCost,wadding:waddingCost,
      extras:otherExtras,total:Math.round(total*100)/100,
      surface:Math.round(surface*1000)/1000,
      volume:Math.round(volume*1000000)/10};
  },[dims.a,dims.b,dims.c,fab,foamKey,extras,cf]);

  const shipping = prices.total>0 ? (prices.total>=89?0:4.50) : 0;
  // a, b, c immer Pflicht – Kalkulation immer als Rechteck
  const dimsOK = cf.sides.every(k=>(dims[k]||"")&&parseFloat(dims[k])>0);
  const canNext = [true,dimsOK,!!fabric,true,true,true];
  const go=n=>{if(n>=0&&n<=5)setStep(n);};
  const setDim=(k,v)=>setDims(d=>({...d,[k]:v}));

  const renderStep=()=>{
    switch(step){
      // ── STEP 0: FORM ──
      case 0: return React.createElement('div',null,
        React.createElement(SH,{n:1,
          title:React.createElement('span',null,"Wähle die ",React.createElement('em',{style:{color:C.sand,fontStyle:"italic"}},"Form"),React.createElement('br'),"deines Polsters."),
          sub:"Klicke auf die passende Form. Die Maße gibst du im nächsten Schritt ein."}),
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:1,
          background:"rgba(184,155,114,.1)",marginBottom:"1.5rem"}},
          FORMS.map(f=>React.createElement('div',{key:f.id,
            onClick:()=>{setFormId(f.id);setDims({});},
            style:{background:formId===f.id?C.linen2:C.chalk,padding:"1rem .7rem",
              cursor:"pointer",textAlign:"center",transition:"all .2s",position:"relative",
              border:`2px solid ${formId===f.id?C.sand:"transparent"}`}},
            formId===f.id&&React.createElement('div',{style:{position:"absolute",top:4,right:6,
              fontSize:10,color:C.sand,fontWeight:700}},"✓"),
            React.createElement('img',{src:FORM_IMAGES[f.id],width:100,height:100,style:{display:"block",margin:"0 auto 8px",objectFit:"contain"}}),
            React.createElement('div',{style:{fontSize:10,fontWeight:500,color:C.bark,lineHeight:1.35}},f.label)
          ))
        ),
        React.createElement(Tip,null,"Wähle die Form die deinem Polster am nächsten kommt.")
      );

      // ── STEP 1: MASSE ──
      case 1: {
        const extra = cf.sides.filter(s=>!["a","b","c"].includes(s));
        return React.createElement('div',null,
          React.createElement(SH,{n:2,
            title:React.createElement('span',null,"Maße für ",React.createElement('em',{style:{color:C.sand,fontStyle:"italic"}},cf.label),"."),
            sub:"Alle Maße in cm angeben. A = Dicke des Polsters."}),
          React.createElement('div',{style:{background:C.linen2,border:"1px dashed rgba(184,155,114,.3)",
            padding:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",marginBottom:"1.5rem",gap:8}},
            React.createElement('img',{src:FORM_IMAGES[formId],width:isMobile?220:360,height:isMobile?220:360,style:{objectFit:"contain"}}),
            cf.sides.every(k=>dims[k])&&React.createElement('div',{style:{fontSize:11,color:C.sand,textAlign:"center"}},
              cf.sides.map(k=>dims[k]?`${k.toUpperCase()}=${dims[k]}cm`:"").filter(Boolean).join(" · "),
              prices.total>0&&fab&&React.createElement('span',{style:{color:C.moss,marginLeft:8}},`→ ${fmt(prices.total)}`)
            )
          ),
          React.createElement('div',{style:{marginBottom:"1.2rem"}},
            React.createElement('div',{style:{fontSize:10,letterSpacing:"0.16em",textTransform:"uppercase",
              color:C.sand,marginBottom:"0.7rem",display:"flex",alignItems:"center",gap:6}},
              React.createElement('span',{style:{width:18,height:1,background:C.sand,display:"inline-block"}}),
              "Alle Maße eingeben (Pflichtfelder)"
            ),
            React.createElement('div',{style:{display:"grid",
              gridTemplateColumns:isMobile?`repeat(${Math.min(cf.sides.length,2)},1fr)`:`repeat(${Math.min(cf.sides.length,3)},1fr)`,gap:"1rem"}},
              cf.sides.map(k=>React.createElement(DimInput,{key:k,label:k,value:dims[k]||"",
                onChange:v=>setDim(k,v),isPrice:true}))
            )
          ),
          React.createElement(Tip,null,
            React.createElement('span',null,"📐 ",React.createElement('strong',null,"A = Dicke:"),
              " Sitzpolster 8–12 cm · Rückenpolster 4–6 cm · Matratzen 10–18 cm")
          )
        );
      }

      // ── STEP 2: STOFF ──
      case 2: {
        const filtered=fabFilter==="alle"?FABRICS:FABRICS.filter(f=>f.cat===fabFilter);
        return React.createElement('div',null,
          React.createElement(SH,{n:3,
            title:React.createElement('span',null,"Wähle deinen",React.createElement('br'),React.createElement('em',{style:{color:C.sand,fontStyle:"italic"}},"Wunschstoff.")),
            sub:"Laufmeterpreis × Oberfläche = Stoffkosten. Filter nach Kategorie."}),
          React.createElement('div',{style:{display:"flex",gap:6,marginBottom:"1rem",flexWrap:"wrap"}},
            ["alle","indoor","premium","outdoor","kunstleder"].map(cat=>
              React.createElement('button',{key:cat,onClick:()=>setFabFilter(cat),
                style:{padding:"5px 12px",fontSize:11,cursor:"pointer",letterSpacing:"0.08em",
                  textTransform:"uppercase",border:`1.5px solid ${fabFilter===cat?C.sand:"rgba(184,155,114,.2)"}`,
                  background:fabFilter===cat?C.sand:"transparent",color:fabFilter===cat?C.bark:C.mid}},
                cat==="alle"?"Alle":cat==="kunstleder"?"Kunstleder":cat.charAt(0).toUpperCase()+cat.slice(1)
              )
            )
          ),
          React.createElement('div',{style:{marginBottom:"0.8rem",display:"flex",alignItems:"center",
            justifyContent:"space-between",flexWrap:"wrap",gap:8}},
            React.createElement('span',{style:{fontSize:11,color:C.mid}},`${filtered.length} Stoffe`),
            React.createElement('a',{
              href:"https://www.polster24.shop/muster-anfordern",
              target:"_blank",
              style:{display:"flex",alignItems:"center",gap:6,
                background:"transparent",border:"1.5px solid "+C.sand,
                color:C.bark,padding:"6px 14px",fontSize:11,fontWeight:600,
                letterSpacing:"0.08em",textTransform:"uppercase",
                textDecoration:"none",whiteSpace:"nowrap"}},
              "✉ Muster anfordern"
            )
          ),
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(2,1fr)",gap:1,
            background:"rgba(184,155,114,.1)",marginBottom:"1.5rem"}},
            filtered.map(f=>{
              const on=fabric===f.id;
              const fp=prices.surface>0?Math.max(47.99,Math.round(prices.surface*f.p*100)/100):null;
              return React.createElement('div',{key:f.id,onClick:()=>setFabric(f.id),

        React.createElement('span',{style:{fontSize:22,fontWeight:300,color:prices.total>0?C.sand:"rgba(253,250,245,.2)",
          fontFamily:"Georgia,serif"}},prices.total>0?fmt(prices.total+shipping):"–")
      ),
      React.createElement('div',{style:{marginTop:"auto",display:"flex",flexDirection:"column",gap:4}},
        ["OEKO-TEX® zertifiziert","±2 mm Präzision","Made in Germany","Kostenlose Muster"].map(t=>
          React.createElement('div',{key:t,style:{fontSize:10,color:"rgba(253,250,245,.3)",
            display:"flex",alignItems:"center",gap:5}},
            React.createElement('span',{style:{color:C.sand,flexShrink:0}},"✓"),t
          )
        )
      )
      )
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
