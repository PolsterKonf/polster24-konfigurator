<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minimaler Wix Message Test</title>
<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f6f6f6;
}
button{
  padding:12px 18px;
  font-size:16px;
  cursor:pointer;
  margin-bottom:12px;
}
#log{
  background:white;
  border:1px solid #ccc;
  padding:12px;
  white-space:pre-wrap;
  font-size:14px;
}
</style>
</head>

<body>

<button id="sendBtn">Testnachricht an Wix senden</button>

<div id="log">HTML geladen...\n</div>

<script>

const logEl = document.getElementById("log");

function log(msg){
  console.log(msg);
  logEl.textContent += msg + "\n";
}

function sendToWix(payload){

  const message = JSON.stringify(payload);

  try{
    window.parent.postMessage(message,"*");
    log("An parent gesendet: " + message);
  }catch(e){
    log("Fehler parent.postMessage: " + e.message);
  }

  try{
    window.top.postMessage(message,"*");
    log("An top gesendet: " + message);
  }catch(e){
    log("Fehler top.postMessage: " + e.message);
  }

}

window.addEventListener("message",(event)=>{
  log("VON WIX EMPFANGEN: " + JSON.stringify(event.data));
});

window.addEventListener("load",()=>{

  log("Fenster geladen");

  sendToWix({
    type:"POLSTER24_READY",
    source:"minimal-test"
  });

});

document.getElementById("sendBtn").addEventListener("click",()=>{

  sendToWix({
    type:"POLSTER24_ADD_TO_CART",
    source:"minimal-test",
    data:{
      form:"Testform",
      total:12.34,
      fabric:"Teststoff",
      foam:"Testschaum"
    }
  });

});

</script>

</body>
</html>
